name: Keep Render Warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -z "$RENDER_BACKEND_URL" ]; then
            echo "Missing RENDER_BACKEND_URL GitHub secret"
            exit 1
          fi

          curl --fail --silent --show-error \
            --max-time 20 \
            --retry 2 \
            --retry-delay 5 \
            "${RENDER_BACKEND_URL%/}/healthz"

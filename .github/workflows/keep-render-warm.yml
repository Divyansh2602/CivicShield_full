name: Keep Render Warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-render-warm
  cancel-in-progress: true

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve keep-warm target
        id: target
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -n "$RENDER_HEALTHCHECK_URL" ]; then
            url="$RENDER_HEALTHCHECK_URL"
          elif [ -n "$RENDER_BACKEND_URL" ]; then
            url="${RENDER_BACKEND_URL%/}/healthz"
          else
            echo "Missing GitHub secret. Set RENDER_HEALTHCHECK_URL or RENDER_BACKEND_URL."
            exit 1
          fi

          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Resolved keep-warm target: $url"

      - name: Ping backend health endpoint
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: |
          curl --fail-with-body --silent --show-error \
            --location \
            --max-time 15 \
            --retry 15 \
            --retry-delay 10 \
            --retry-all-errors \
            --write-out "\nHTTP %{http_code}\n" \
            "$TARGET_URL"
